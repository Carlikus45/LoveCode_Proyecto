<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveCode — Registro</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <h1>❤️ LoveCode</h1>
  <p class="subtitulo">Crea tu perfil de desarrollador</p>

  <div class="caja">
    <h2>Registro</h2>

    <div id="mensaje" class="mensaje"></div>

    <label for="nombre">Nombre</label>
    <input type="text" id="nombre" placeholder="Tu nombre"/>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="tu@correo.com"/>

    <label for="password">Contraseña</label>
    <input type="password" id="password" placeholder="••••••••"/>

    <label for="descripcion">Descripción</label>
    <textarea id="descripcion" placeholder="Cuéntanos algo sobre ti..."></textarea>

    <label>Tecnologías que dominas</label>
    <div id="tecs" class="tec-lista">
      <span style="color:#999; font-size:13px;">Cargando...</span>
    </div>

    <button class="boton" onclick="registro()">Crear cuenta</button>

    <p class="enlace-abajo">
      ¿Ya tienes cuenta? <a href="index.html">Inicia sesión</a>
    </p>
  </div>

  <script>
    const SERVIDOR = 'http://localhost:8080';

    async function cargarTecnologias() {
      const div = document.getElementById('tecs');
      try {
        const res  = await fetch(SERVIDOR + '/tecnologias');
        const tecs = await res.json();
        div.innerHTML = '';
        tecs.forEach(t => {
          const lbl = document.createElement('label');
          lbl.innerHTML = `<input type="checkbox" value="${t.id}"> ${t.nombre}`;
          div.appendChild(lbl);
        });
      } catch (e) {
        div.innerHTML = '<span style="color:#cc0000; font-size:13px;">⚠️ Backend no disponible</span>';
      }
    }

    cargarTecnologias();

    async function registro() {
      const nombre      = document.getElementById('nombre').value.trim();
      const email       = document.getElementById('email').value.trim();
      const password    = document.getElementById('password').value;
      const descripcion = document.getElementById('descripcion').value.trim();
      const marcadas    = document.querySelectorAll('#tecs input:checked');
      const tecnologias = Array.from(marcadas).map(c => parseInt(c.value));

      if (!nombre || !email || !password) {
        mostrarMensaje('Rellena los campos obligatorios', 'error');
        return;
      }

      try {
        const res   = await fetch(SERVIDOR + '/registro', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ nombre, email, password, descripcion, tecnologias })
        });
        const datos = await res.json();

        if (datos.ok) {
          sessionStorage.setItem('idSesion', datos.id);
          window.location.href = 'perfiles.html';
        } else {
          mostrarMensaje(datos.error || 'Error al registrar', 'error');
        }
      } catch (e) {
        mostrarMensaje('No se puede conectar con el servidor', 'error');
      }
    }

    function mostrarMensaje(texto, tipo) {
      const div = document.getElementById('mensaje');
      div.textContent = texto;
      div.className   = 'mensaje ' + tipo;
    }
  </script>

</body>
</html>
