<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LoveCode — Perfiles</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="navbar">
    <span>❤️ LoveCode</span>
    <button class="boton-gris" onclick="salir()">Cerrar sesión</button>
  </div>

  <div id="grid" class="grid">
    <p style="color:white;">Cargando perfiles...</p>
  </div>


  <div class="fondo-modal" id="modal">
    <div class="modal">
      <h2>¡Es un Match! ❤️</h2>
      <div id="info-match"></div>
      <div class="modal-botones">
        <button class="boton" style="width:auto;" onclick="verFicha()">Ver ficha</button>
        <button class="boton-gris" onclick="cerrarModal()">Seguir</button>
      </div>
    </div>
  </div>

  <script>
    const SERVIDOR = 'http://localhost:8080';
    const idSesion = sessionStorage.getItem('idSesion');

    if (!idSesion) window.location.href = 'index.html';

    function salir() {
      sessionStorage.clear();
      window.location.href = 'index.html';
    }

    async function cargarPerfiles() {
      const grid = document.getElementById('grid');
      try {
        const res      = await fetch(SERVIDOR + '/perfiles?idSesion=' + idSesion);
        const perfiles = await res.json();

        if (!perfiles.length) {
          grid.innerHTML = '<p style="color:white;">No hay más perfiles 💔</p>';
          return;
        }

        grid.innerHTML = '';
        perfiles.forEach(p => grid.appendChild(crearTarjeta(p)));
      } catch (e) {
        grid.innerHTML = '<p style="color:white;">Error al cargar perfiles. ¿Está el backend arrancado?</p>';
      }
    }

    function crearTarjeta(perfil) {
      const div = document.createElement('div');
      div.className = 'tarjeta';

      const inicial = perfil.nombre.charAt(0).toUpperCase();
      const tecs    = perfil.tecnologias.join(', ') || 'Sin tecnologías';

      div.innerHTML = `
        <div class="inicial">${inicial}</div>
        <h3>${perfil.nombre}</h3>
        <p>${perfil.descripcion || ''}</p>
        <p class="tecnologias">${tecs}</p>
        <button class="boton-like" onclick="darLike(this, ${perfil.id})">❤️ Like</button>
      `;
      return div;
    }

    async function darLike(boton, idReceptor) {
      boton.disabled    = true;
      boton.textContent = '✓ Enviado';

      try {
        const res   = await fetch(SERVIDOR + '/like', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ idEmisor: parseInt(idSesion), idReceptor })
        });
        const datos = await res.json();
        if (datos.match) mostrarMatch(datos.xml);
      } catch (e) {
        console.error('Error al dar like:', e);
      }
    }

    function mostrarMatch(xmlTexto) {
      const parser  = new DOMParser();
      const doc     = parser.parseFromString(xmlTexto, 'application/xml');
      const nombre1 = doc.querySelector('usuario1 nombre')?.textContent || '';
      const nombre2 = doc.querySelector('usuario2 nombre')?.textContent || '';
      const comunes = Array.from(doc.querySelectorAll('tecnologias_comunes tecnologia'))
                          .map(n => n.textContent).join(', ') || 'Ninguna';

      document.getElementById('info-match').innerHTML = `
        <p><strong>${nombre1}</strong> y <strong>${nombre2}</strong> se han dado like ❤️</p>
        <p style="font-size:13px; color:#666;">Tecnologías en común: ${comunes}</p>
      `;

      window._ultimoXml = xmlTexto;
      document.getElementById('modal').classList.add('visible');
    }

    function verFicha() {
      if (!window._ultimoXml) return;
      fetch('match.xsl')
        .then(r => r.text())
        .then(xslTexto => {
          const parser = new DOMParser();
          const xmlDoc = parser.parseFromString(window._ultimoXml, 'application/xml');
          const xslDoc = parser.parseFromString(xslTexto, 'application/xml');
          const xslt   = new XSLTProcessor();
          xslt.importStylesheet(xslDoc);
          const result = xslt.transformToDocument(xmlDoc);
          const html   = new XMLSerializer().serializeToString(result);
          const blob   = new Blob([html], { type: 'text/html' });
          window.open(URL.createObjectURL(blob), '_blank');
        });
    }

    function cerrarModal() {
      document.getElementById('modal').classList.remove('visible');
    }

    cargarPerfiles();
  </script>

</body>
</html>
