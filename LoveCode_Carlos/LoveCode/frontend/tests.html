<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <title>LoveCode — Tests</title>
  <link rel="stylesheet" href="style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { display:block; padding:2rem; overflow:auto; }
    .titulo-tests {
      font-family:'Space Mono',monospace; font-size:1.1rem;
      color:rgba(255,255,255,0.6); margin-bottom:.4rem; letter-spacing:1px;
    }
    .subtitulo { font-size:13px; color:rgba(255,255,255,0.25); margin-bottom:2rem; }
    .prueba {
      padding:10px 16px; border-radius:8px; margin-bottom:8px;
      font-size:13px; font-family:'Space Mono',monospace;
    }
    .prueba.ok   { background:rgba(0,200,100,0.08); color:#6effc0; border:1px solid rgba(0,200,100,0.2); }
    .prueba.fail { background:rgba(220,38,100,0.1); color:#ff6b9d; border:1px solid rgba(220,38,100,0.25); }
    .resumen {
      margin-top:1.5rem; padding:14px 18px; border-radius:10px;
      font-family:'Space Mono',monospace; font-size:14px;
    }
    .resumen.todo-ok   { background:rgba(0,200,100,0.08); color:#6effc0; border:1px solid rgba(0,200,100,0.2); }
    .resumen.hay-fallos { background:rgba(220,38,100,0.1); color:#ff6b9d; border:1px solid rgba(220,38,100,0.25); }
  </style>
</head>
<body>

<div class="particles" id="particles"></div>
<div class="deco deco-tl">❤️ &lt;/love&gt; ❤️</div>
<div class="deco deco-tr">{ code: true } ♥</div>
<div class="deco deco-bl">♥ while(love)</div>
<div class="deco deco-br">return ❤️;</div>

<div style="position:relative; z-index:1; max-width:700px; margin:0 auto;">
  <p class="titulo-tests">// LoveCode — Pruebas unitarias</p>
  <p class="subtitulo">crearTarjeta · validarLogin · validarRegistro · parsearXml</p>
  <div id="resultados"></div>
  <div id="resumen"></div>
</div>

<script>
  const snippets = ['if(love)','return ❤️;','{ }','while(true)','commit()','&lt;3','git push','null','// TODO: love','class Dev'];
  const container = document.getElementById('particles');
  for (let i = 0; i < 12; i++) {
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = snippets[i % snippets.length];
    el.style.left = Math.random() * 100 + 'vw';
    el.style.animationDuration = (14 + Math.random() * 16) + 's';
    el.style.animationDelay = (-Math.random() * 20) + 's';
    container.appendChild(el);
  }
</script>

<script src="tests.js"></script>
<script>
  const divResultados = document.getElementById('resultados');
  const divResumen    = document.getElementById('resumen');

  resultados.forEach(r => {
    const div = document.createElement('div');
    div.className = 'prueba ' + (r.ok ? 'ok' : 'fail');
    div.textContent = (r.ok ? '✓ ' : '✗ ') + r.nombre + (r.error ? ' → ' + r.error : '');
    divResultados.appendChild(div);
  });

  const res = document.createElement('div');
  res.className = 'resumen ' + (pruebas_fail === 0 ? 'todo-ok' : 'hay-fallos');
  res.textContent = pruebas_fail === 0
    ? '// return "todas las pruebas pasaron ❤️"; — ' + pruebas_ok + '/' + totalPruebas
    : '// ERROR: ' + pruebas_fail + ' fallando | ' + pruebas_ok + ' OK de ' + totalPruebas;
  divResumen.appendChild(res);
</script>
</body>
</html>
